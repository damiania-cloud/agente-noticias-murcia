name: Noticias Diarias Murcia

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  enviar-noticias:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Diagnostico secrets
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "Token length: ${#TELEGRAM_TOKEN}"
          echo "Chat ID: ${CHAT_ID}"
          python -c "import os; t=os.environ.get('TELEGRAM_TOKEN',''); print('Python token len:', len(t))"
      - name: Enviar noticias a Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python noticias_murcia.py
