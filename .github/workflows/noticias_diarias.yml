name: Noticias Diarias Murcia

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enviar-noticias:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Enviar noticias a Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python noticias_murcia.py
      - name: Guardar historial de noticias enviadas
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions Bot"
          git add sent_news.json
          git diff --staged --quiet || git commit -m "Actualizar historial noticias enviadas"
          git push
